databases:
  - name: c2farms-db
    databaseName: c2farms
    user: c2farms

services:
  - type: web
    name: c2farms
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    disk:
      name: c2farms-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: c2farms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: ""
      - key: FRONTEND_URL
        value: ""
