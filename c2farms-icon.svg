<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="238" fill="none" stroke="#A5D6A7" stroke-width="3" opacity="0.5"/>

  <!-- Wheat stalk left -->
  <g transform="translate(130, 100)" fill="#FFD54F" opacity="0.35">
    <ellipse cx="0" cy="60" rx="8" ry="20" transform="rotate(-15)"/>
    <ellipse cx="0" cy="95" rx="8" ry="20" transform="rotate(-15)"/>
    <ellipse cx="0" cy="130" rx="8" ry="20" transform="rotate(-15)"/>
    <line x1="5" y1="40" x2="15" y2="180" stroke="#FFD54F" stroke-width="3"/>
  </g>

  <!-- Wheat stalk right -->
  <g transform="translate(370, 100)" fill="#FFD54F" opacity="0.35">
    <ellipse cx="0" cy="60" rx="8" ry="20" transform="rotate(15)"/>
    <ellipse cx="0" cy="95" rx="8" ry="20" transform="rotate(15)"/>
    <ellipse cx="0" cy="130" rx="8" ry="20" transform="rotate(15)"/>
    <line x1="-5" y1="40" x2="-15" y2="180" stroke="#FFD54F" stroke-width="3"/>
  </g>

  <!-- C2 Text -->
  <text x="256" y="245" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="160" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">C2</text>

  <!-- FARMS Text -->
  <text x="256" y="340" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="64" fill="#A5D6A7" text-anchor="middle" letter-spacing="16">FARMS</text>
</svg>